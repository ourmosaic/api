services:
  db:
    image: postgres:15-alpine
    container_name: mosaic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mosaic_user
      POSTGRES_PASSWORD: mosaic_password
      POSTGRES_DB: mosaic_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mosaic-network
  redis:
    image: redis:7-alpine
    container_name: mosaic-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - mosaic-network
volumes:
  postgres_data:
  redis_data:
networks:
  mosaic-network:
    driver: bridge